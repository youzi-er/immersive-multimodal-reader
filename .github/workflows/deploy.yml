name: Deploy to Tencent Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify frontend build
        run: npm run build

      - name: Create deployment package
        run: |
          git archive --format=tar.gz -o "$RUNNER_TEMP/immersive-release.tgz" HEAD

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload package to server
        run: |
           scp -i ~/.ssh/deploy_key "$RUNNER_TEMP/immersive-release.tgz" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/${{ secrets.SERVER_USER }}/immersive-release.tgz"

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" <<'EOF'
          set -e

          export NVM_DIR="$HOME/.nvm"
          if [ -s "$NVM_DIR/nvm.sh" ]; then
            . "$NVM_DIR/nvm.sh"
          fi

          APP_DIR="$HOME/immersive-multimodal-reader"
          NEW_DIR="$HOME/immersive-multimodal-reader.new"
          PREV_DIR="$HOME/immersive-multimodal-reader.prev"
          RELEASE="$HOME/immersive-release.tgz"
          WEB_DIR="/var/www/immersive-reader"
          MEDIA_DIR="$HOME/immersive-reader-media"

          rm -rf "$NEW_DIR"
          mkdir -p "$NEW_DIR"
          tar -xzf "$RELEASE" -C "$NEW_DIR"

          cd "$NEW_DIR"

          cat > .env <<ENVEOF
          MINIMAX_API_KEY=${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_GROUP_ID=${{ secrets.MINIMAX_GROUP_ID }}
          MINIMAX_API_BASE=https://api.minimaxi.com
          MINIMAX_TEXT_MODEL=MiniMax-M3
          MINIMAX_TTS_MODEL=speech-2.8-hd
          MINIMAX_IMAGE_MODEL=image-01
          MINIMAX_DEFAULT_VOICE_ID=Chinese (Mandarin)_Lyrical_Voice
          MYSQL_HOST=${{ secrets.MYSQL_HOST }}
          MYSQL_PORT=${{ secrets.MYSQL_PORT }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          MEDIA_STORAGE_ROOT=$MEDIA_DIR
          ENVEOF

          mkdir -p "$MEDIA_DIR"
          if [ -d "$APP_DIR/backend/storage/media" ] && [ -z "$(ls -A "$MEDIA_DIR" 2>/dev/null)" ]; then
            cp -a "$APP_DIR/backend/storage/media/." "$MEDIA_DIR"/
          fi

          mysql \
            -h "${{ secrets.MYSQL_HOST }}" \
            -P "${{ secrets.MYSQL_PORT }}" \
            -u "${{ secrets.MYSQL_USER }}" \
            -p"${{ secrets.MYSQL_PASSWORD }}" \
            "${{ secrets.MYSQL_DATABASE }}" < backend/sql/001_media_assets.sql

          npm install
          npm run build

          mkdir -p "$WEB_DIR"
          rm -rf "$WEB_DIR"/*
          cp -r frontend/dist/* "$WEB_DIR"/
          ln -sfn "$MEDIA_DIR" "$WEB_DIR/media"

          rm -rf "$PREV_DIR"
          if [ -d "$APP_DIR" ]; then
            mv "$APP_DIR" "$PREV_DIR"
          fi
          mv "$NEW_DIR" "$APP_DIR"

          cd "$APP_DIR"

          # Recreate the process so PM2 cannot retain an executable or cwd from
          # the directory that was moved to the previous-release location.
          pm2 delete immersive-reader > /dev/null 2>&1 || true
          pm2 start "$APP_DIR/backend/src/server.js" --name immersive-reader --cwd "$APP_DIR"

          pm2 save

          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:3001/api/health; then
              break
            fi

            if [ "$i" -eq 20 ]; then
              pm2 logs immersive-reader --lines 80 --nostream
              exit 1
            fi

            sleep 1
          done

          curl -fsS http://127.0.0.1/api/health

          verify_clue_api() {
            base_url="$1"
            curl -fsS "$base_url/api/clues" | node -e '
              const fs = require("fs");
              const clues = JSON.parse(fs.readFileSync(0, "utf8"));
              if (!Array.isArray(clues) || !clues.some((clue) => Array.isArray(clue.occurrences) && clue.occurrences.length > 0)) {
                throw new Error("Precise clue index is not active");
              }
            '
            curl -fsS "$base_url/api/ai/clue-images?articleId=speckled-band&occurrenceIds=__deploy_smoke__" | node -e '
              const fs = require("fs");
              const payload = JSON.parse(fs.readFileSync(0, "utf8"));
              if (!Array.isArray(payload.images)) {
                throw new Error("Clue image API is not active");
              }
            '
          }

          verify_clue_api http://127.0.0.1:3001
          verify_clue_api http://127.0.0.1

          rm -f "$RELEASE"
          EOF
